<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Restomod - 3D Configurator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    
    <!-- 시네마틱 인트로 오버레이 -->
    <div id="intro-overlay">
        <div class="intro-sequence">
            <div class="pixel-logo-container">
                <div class="pixel-box" id="pb-1"></div>
                <div class="pixel-box" id="pb-2"></div>
                <div class="pixel-box" id="pb-3"></div>
                <div class="pixel-box" id="pb-4"></div>
            </div>
            <div id="year-counter" class="year-text"></div>
            <div class="intro-bounding-frame" id="gl-frame"></div>
            <div class="intro-text-final" id="final-title" style="display:none;">STELLAR, STILL HERE</div>
        </div>
    </div>

    <!-- 3D WebGL Canvas -->
    <div id="webgl-container"></div>

    <!-- 로딩 인디케이터 -->
    <div id="drop-zone">
        <div class="drop-zone-inner">
            <div class="loader-spinner"></div>
            <p class="drop-title">Loading 3D Model...</p>
            <p class="drop-hint">stella.glb</p>
        </div>
    </div>

    <!-- ★ 좌측 아이콘 사이드바 (Honda Style) -->
    <div id="sidebar" class="hidden">
        <button class="sidebar-icon" data-panel="color" title="Body Color">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
            <span>컬러</span>
        </button>
        <button class="sidebar-icon" data-panel="material" title="Material">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span>재질</span>
        </button>
        <button class="sidebar-icon" data-panel="scene" title="Scene">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span>배경</span>
        </button>
    </div>

    <!-- ★ 슬라이드 아웃 패널들 -->
    <!-- 컬러 패널 -->
    <div id="panel-color" class="slide-panel">
        <div class="panel-top">
            <h3>BODY COLOR</h3>
            <button class="panel-close">✕</button>
        </div>
        <p class="panel-subtitle">베이직 컬러</p>
        <div class="swatch-grid">
            <button class="swatch" data-color="#f5f5f0" data-name="Ivory White" title="Ivory White"><span class="swatch-color" style="background:#f5f5f0"></span></button>
            <button class="swatch" data-color="#ffffff" data-name="Pure White" title="Pure White"><span class="swatch-color" style="background:#ffffff; border:1px solid #ddd;"></span></button>
            <button class="swatch" data-color="#111111" data-name="Obsidian Black" title="Obsidian Black"><span class="swatch-color" style="background:#111111"></span></button>
            <button class="swatch" data-color="#c0c0c0" data-name="Lunar Silver" title="Lunar Silver"><span class="swatch-color" style="background:#c0c0c0"></span></button>
            <button class="swatch" data-color="#d4c5a9" data-name="Sand Beige" title="Sand Beige"><span class="swatch-color" style="background:#d4c5a9"></span></button>
            <button class="swatch" data-color="#4a4a4a" data-name="Gunmetal Gray" title="Gunmetal Gray"><span class="swatch-color" style="background:#4a4a4a"></span></button>
        </div>
        <p class="panel-subtitle" style="margin-top:20px;">프리미엄 컬러</p>
        <div class="swatch-grid">
            <button class="swatch" data-color="#1a2744" data-name="Midnight Navy" title="Midnight Navy"><span class="swatch-color" style="background:#1a2744"></span></button>
            <button class="swatch" data-color="#8b1a1a" data-name="Burgundy Red" title="Burgundy Red"><span class="swatch-color" style="background:#8b1a1a"></span></button>
            <button class="swatch" data-color="#2d4a3e" data-name="British Green" title="British Green"><span class="swatch-color" style="background:#2d4a3e"></span></button>
            <button class="swatch" data-color="#3a2a1a" data-name="Espresso Brown" title="Espresso Brown"><span class="swatch-color" style="background:#3a2a1a"></span></button>
        </div>
        <div class="selected-info" id="color-info">Ivory White</div>
    </div>

    <!-- 재질 패널 -->
    <div id="panel-material" class="slide-panel">
        <div class="panel-top">
            <h3>MATERIAL</h3>
            <button class="panel-close">✕</button>
        </div>
        <p class="panel-subtitle" id="selected-part">파츠를 클릭하세요</p>
        <div class="control-group">
            <label>METALLIC</label>
            <input type="range" id="mat-metal" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>ROUGHNESS</label>
            <input type="range" id="mat-rough" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <!-- 배경 패널 -->
    <div id="panel-scene" class="slide-panel">
        <div class="panel-top">
            <h3>SCENE</h3>
            <button class="panel-close">✕</button>
        </div>
        <div class="scene-options">
            <button class="scene-btn active" data-scene="light">
                <span class="scene-preview" style="background: linear-gradient(180deg, #d0d0d0 0%, #bbbbbb 100%);"></span>
                <span>White Studio</span>
            </button>
            <button class="scene-btn" data-scene="navy">
                <span class="scene-preview" style="background: linear-gradient(180deg, #1a2030 0%, #2a3040 100%);"></span>
                <span>Navy Retro</span>
            </button>
        </div>
    </div>

    <!-- 우측 하단 상태 표시 (Honda Style) -->
    <div id="status-bar" class="hidden">
        <p class="status-model">STELLAR RESTOMOD</p>
        <p class="status-color" id="status-color-name">차체색 : Ivory White</p>
    </div>

    <!-- 상단 로고 -->
    <div class="top-nav hidden" id="top-nav">
        <span class="logo">STELLAR RESTOMOD</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
