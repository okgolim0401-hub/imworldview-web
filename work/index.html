    <style>
        /* Smooth scrolling for main page snap effect */
        html {
            scroll-behavior: smooth;
        }
        /* Hidden lang class for translation */
        .hidden-lang {
            display: none !important;
        }
        
        /* Full-screen section setup */
        .project-section {
            height: 70vh;
            min-height: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        .project-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1), filter 1s ease-out;
            will-change: transform;
        }
        
        .project-section:has(.project-link:hover) .project-bg-img {
            filter: brightness(1.1);
        }
        

        
        .project-overlay {
            position: absolute;
            inset: 0;
            /* Added a solid dark tint combined with the gradient for better text readability */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
            pointer-events: none;
        }
        
        .project-content {
            position: relative;
            z-index: 10;
            padding-bottom: 3rem;
        }
        
        @media (min-width: 768px) {
            .project-content {
                padding-bottom: 5rem;
            }
        }
        
        /* Interactive Title Hover Effect */
        .project-title {
            position: relative;
            display: inline-block;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), letter-spacing 0.8s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s ease, text-shadow 0.4s ease;
        }
        
        .project-link:hover .project-title {
            color: #fff;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
            transform: scale(1.03);
            letter-spacing: 0.05em;
        }
        
        .project-subtitle {
            transition: letter-spacing 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
        }
        
        .project-link:hover .project-subtitle {
            letter-spacing: 0.45em;
            opacity: 1;
        }
        
        /* Arrow icon reveal */
        .arrow-icon {
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Arrow icon reveal */
        .project-link:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
        }
    </style>

<script>
    function toggleMobileMenu() {
        const overlay = document.getElementById('mobile-menu-overlay');
        const line = document.getElementById('menu-line');
        if (!overlay || !line) return;
        
        const isHidden = overlay.classList.contains('opacity-0');
        if (isHidden) {
            overlay.classList.remove('pointer-events-none');
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');
            line.style.transform = 'scaleX(0.6)';
            line.style.backgroundColor = '#e2e2e2';
        } else {
            overlay.classList.add('pointer-events-none');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            line.style.transform = 'scaleX(1)';
            line.style.backgroundColor = '#fff';
        }
    }
    document.getElementById('mobile-menu-trigger').addEventListener('click', toggleMobileMenu);

    function toggleLanguage(btn, lang) {
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.remove('active', 'text-primary');
            b.classList.add('text-outline');
        });
        btn.classList.remove('text-outline');
        btn.classList.add('active', 'text-primary');
        
        const koTexts = document.querySelectorAll('.mobile-ko-text');
        const enTexts = document.querySelectorAll('.mobile-en-text');
        
        if (lang === 'ko') {
            koTexts.forEach(t => t.classList.remove('hidden-lang'));
            enTexts.forEach(t => t.classList.add('hidden-lang'));
        } else {
            koTexts.forEach(t => t.classList.add('hidden-lang'));
            enTexts.forEach(t => t.classList.remove('hidden-lang'));
        }
    }
</script>
